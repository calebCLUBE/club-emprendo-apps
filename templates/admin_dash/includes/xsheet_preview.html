{% load static inline_static %}
{% with root_id=sheet_id|add:"-root" headers_id=sheet_id|add:"-headers" rows_id=sheet_id|add:"-rows" %}
<link rel="stylesheet" href="{% static 'vendor/x-data-spreadsheet/xspreadsheet.css' %}">
<style>
  /* Keep toolbar text/icons readable across Django admin theme overrides */
  .x-spreadsheet-toolbar,
  .x-spreadsheet-bottombar,
  .x-spreadsheet-toolbar .x-spreadsheet-toolbar-btn,
  .x-spreadsheet-toolbar .x-spreadsheet-dropdown-title,
  .x-spreadsheet-menu > li,
  .x-spreadsheet-menu > li.active,
  .x-spreadsheet-form-input input,
  .x-spreadsheet-form-select,
  .x-spreadsheet-form-select .input-text,
  .x-spreadsheet-item,
  .x-spreadsheet-header {
    color: #1f2937 !important;
  }
  .x-spreadsheet-sort-filter,
  .x-spreadsheet-sort-filter *,
  .x-spreadsheet-filter,
  .x-spreadsheet-filter *,
  .x-spreadsheet-suggest,
  .x-spreadsheet-suggest *,
  .x-spreadsheet-contextmenu,
  .x-spreadsheet-contextmenu * {
    color: #1f2937 !important;
  }
  .x-spreadsheet-sort-filter,
  .x-spreadsheet-filter,
  .x-spreadsheet-suggest,
  .x-spreadsheet-contextmenu {
    background: #ffffff !important;
    z-index: 4000 !important;
  }
  .x-spreadsheet-filter .x-spreadsheet-item .label {
    color: #475569 !important;
    opacity: 0.95 !important;
  }
  .x-spreadsheet-icon .x-spreadsheet-icon-img {
    opacity: 0.72;
  }

  .ce-sheet-preview-wrap {
    border: 1px solid #ddd;
    border-radius: 10px;
    background: #fff;
    overflow: visible;
    min-height: 620px;
  }
  .ce-sheet-preview-canvas {
    width: 100%;
    min-height: 620px;
    height: 100%;
  }
  .ce-sheet-preview-note {
    margin: 8px 0 0;
    color: #666;
    font-size: 12px;
  }
  .ce-sheet-fallback {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .ce-sheet-fallback th,
  .ce-sheet-fallback td {
    border: 1px solid #e5e7eb;
    padding: 6px 8px;
    vertical-align: top;
    text-align: left;
    white-space: nowrap;
  }
  .ce-sheet-fallback thead th {
    position: sticky;
    top: 0;
    z-index: 1;
    background: #f9fafb;
  }
</style>

<div class="ce-sheet-preview-wrap">
  <div id="{{ root_id }}" class="ce-sheet-preview-canvas"></div>
</div>

{{ sheet_headers|json_script:headers_id }}
{{ sheet_rows|json_script:rows_id }}
<script>
{% inline_static 'vendor/x-data-spreadsheet/xspreadsheet.js' %}
</script>
<script>
  (function () {
    const LOCAL_XSHEET_JS_URL = "{% static 'vendor/x-data-spreadsheet/xspreadsheet.js' %}";
    const root = document.getElementById('{{ root_id }}');
    if (!root) {
      return;
    }

    const headers = JSON.parse(document.getElementById('{{ headers_id }}').textContent || '[]');
    const rows = JSON.parse(document.getElementById('{{ rows_id }}').textContent || '[]');

    function shieldPopupEvents() {
      const stopForPopup = function (ev) {
        const target = ev.target;
        if (!(target instanceof Element)) {
          return;
        }
        if (
          target.closest('.x-spreadsheet-sort-filter') ||
          target.closest('.x-spreadsheet-filter') ||
          target.closest('.x-spreadsheet-suggest') ||
          target.closest('.x-spreadsheet-contextmenu')
        ) {
          ev.stopPropagation();
          if (typeof ev.stopImmediatePropagation === 'function') {
            ev.stopImmediatePropagation();
          }
        }
      };
      if (document.body) {
        document.body.addEventListener('click', stopForPopup, false);
      }
    }

    function patchSortFilterOutsideClick(spreadsheet) {
      try {
        const sortFilter =
          spreadsheet &&
          spreadsheet.sheet &&
          spreadsheet.sheet.sortFilter;
        if (!sortFilter || sortFilter.__ceOutsideClickPatched) {
          return;
        }
        const originalSetOffset =
          typeof sortFilter.setOffset === 'function'
            ? sortFilter.setOffset.bind(sortFilter)
            : null;
        if (!originalSetOffset) {
          return;
        }
        sortFilter.setOffset = function patchedSetOffset(offset) {
          try {
            const holder = this.el;
            if (holder && holder.xclickoutside) {
              document.body.removeEventListener('click', holder.xclickoutside);
              delete holder.xclickoutside;
            }
          } catch (err) {
            // no-op: defensive guard around third-party internals
          }
          return originalSetOffset(offset);
        };
        sortFilter.__ceOutsideClickPatched = true;
      } catch (err) {
        // no-op: defensive guard around third-party internals
      }
    }

    function seedMatrixFromCsv() {
      const width = Math.max(1, Array.isArray(headers) ? headers.length : 0);
      const headerRow = [];
      for (let i = 0; i < width; i += 1) {
        headerRow.push(String(headers[i] == null ? '' : headers[i]));
      }
      const matrix = [headerRow];
      if (!Array.isArray(rows)) {
        return matrix;
      }
      rows
        .filter((r) => Array.isArray(r))
        .forEach((r) => {
          const out = [];
          for (let i = 0; i < width; i += 1) {
            out.push(i < r.length ? String(r[i] == null ? '' : r[i]) : '');
          }
          matrix.push(out);
        });
      return matrix;
    }

    function colLabelFromIndex(idx) {
      let n = Number(idx);
      if (!Number.isFinite(n) || n < 0) {
        return 'A';
      }
      let out = '';
      while (n >= 0) {
        out = String.fromCharCode((n % 26) + 65) + out;
        n = Math.floor(n / 26) - 1;
      }
      return out || 'A';
    }

    function buildSheetPayload(matrix) {
      const rowCount = Math.max(1, Array.isArray(matrix) ? matrix.length : 1);
      const colCount = Math.max(1, Array.isArray(matrix[0]) ? matrix[0].length : 1);
      const rowsObj = { len: rowCount };
      const colsObj = { len: colCount };

      for (let r = 0; r < rowCount; r += 1) {
        const srcRow = Array.isArray(matrix[r]) ? matrix[r] : [];
        const cells = {};
        for (let c = 0; c < colCount; c += 1) {
          const text = String(c < srcRow.length ? (srcRow[c] == null ? '' : srcRow[c]) : '');
          if (!text) {
            continue;
          }
          cells[c] = { text };
        }
        if (Object.keys(cells).length || r === 0) {
          rowsObj[r] = { cells };
        }
      }

      const payload = [{
        name: 'Sheet1',
        freeze: 'A1',
        styles: [],
        merges: [],
        rows: rowsObj,
        cols: colsObj,
        validations: [],
        autofilter: {},
      }];

      if (rowCount > 1 && colCount > 0) {
        const lastColLabel = colLabelFromIndex(colCount - 1);
        payload[0].autofilter = {
          ref: `A1:${lastColLabel}${rowCount}`,
          filters: [],
          sort: null,
        };
      }
      return payload;
    }

    function fitToViewport() {
      const wrap = root.closest('.ce-sheet-preview-wrap');
      const rect = root.getBoundingClientRect();
      const viewport = window.innerHeight || document.documentElement.clientHeight || 900;
      const available = Math.max(620, Math.floor(viewport - rect.top - 6));
      if (wrap) {
        wrap.style.height = `${available}px`;
      }
      root.style.height = `${Math.max(600, available - 2)}px`;
    }

    function ensureSpreadsheetLib() {
      if (typeof window.x_spreadsheet === 'function') {
        return Promise.resolve(true);
      }
      if (window.__ceXSheetLocalLoadPromise && typeof window.__ceXSheetLocalLoadPromise.then === 'function') {
        return window.__ceXSheetLocalLoadPromise;
      }
      window.__ceXSheetLocalLoadPromise = new Promise((resolve) => {
        const tag = document.createElement('script');
        tag.src = LOCAL_XSHEET_JS_URL;
        tag.async = true;
        tag.onload = function () {
          resolve(typeof window.x_spreadsheet === 'function');
        };
        tag.onerror = function () {
          resolve(false);
        };
        document.head.appendChild(tag);
      });
      return window.__ceXSheetLocalLoadPromise;
    }

    function renderFallback(matrix) {
      const warn = document.createElement('div');
      warn.style.padding = '10px 12px';
      warn.style.borderBottom = '1px solid #fde68a';
      warn.style.background = '#fffbeb';
      warn.style.color = '#92400e';
      warn.style.fontSize = '12px';
      warn.textContent = 'Excel-style toolbar library did not load. Showing basic preview fallback.';

      const table = document.createElement('table');
      table.className = 'ce-sheet-fallback';
      const thead = document.createElement('thead');
      const tbody = document.createElement('tbody');
      table.appendChild(thead);
      table.appendChild(tbody);

      const headerTr = document.createElement('tr');
      (matrix[0] || []).forEach((header) => {
        const th = document.createElement('th');
        th.textContent = String(header == null ? '' : header);
        headerTr.appendChild(th);
      });
      thead.appendChild(headerTr);

      for (let r = 1; r < matrix.length; r += 1) {
        const tr = document.createElement('tr');
        (matrix[r] || []).forEach((cell) => {
          const td = document.createElement('td');
          td.textContent = String(cell == null ? '' : cell);
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      }

      root.innerHTML = '';
      root.style.overflow = 'auto';
      root.appendChild(warn);
      root.appendChild(table);
    }

    function hydrateSpreadsheet(spreadsheet, matrix) {
      if (!spreadsheet || typeof spreadsheet.cellText !== 'function') {
        return;
      }
      for (let r = 0; r < matrix.length; r += 1) {
        const row = Array.isArray(matrix[r]) ? matrix[r] : [];
        for (let c = 0; c < row.length; c += 1) {
          const text = String(row[c] == null ? '' : row[c]);
          if (!text) {
            continue;
          }
          spreadsheet.cellText(r, c, text, 0);
        }
      }
    }

    function initSpreadsheet(matrix) {
      ensureSpreadsheetLib().finally(function () {
        if (typeof window.x_spreadsheet !== 'function') {
          renderFallback(matrix);
          return;
        }
        try {
          fitToViewport();
          const spreadsheet = x_spreadsheet('#{{ root_id }}', {
            mode: 'edit',
            showToolbar: true,
            showGrid: true,
            showContextmenu: true,
            row: {
              len: Math.max(1, matrix.length),
              height: 28,
            },
            col: {
              len: Math.max(1, matrix[0] ? matrix[0].length : 1),
              width: 140,
              minWidth: 64,
              indexWidth: 50,
            },
            view: {
              height: function () {
                return Math.max(
                  360,
                  root.clientHeight || {{ sheet_height|default:560 }}
                );
              },
            },
          });
          patchSortFilterOutsideClick(spreadsheet);
          if (typeof spreadsheet.loadData === 'function') {
            spreadsheet.loadData(buildSheetPayload(matrix));
            hydrateSpreadsheet(spreadsheet, matrix);
          }
          window.addEventListener('resize', fitToViewport, { passive: true });
        } catch (err) {
          renderFallback(matrix);
        }
      });
    }

    const seedMatrix = seedMatrixFromCsv();
    shieldPopupEvents();
    fitToViewport();
    initSpreadsheet(seedMatrix);
  })();
</script>
{% endwith %}
