{% with root_id=sheet_id|add:"-root" headers_id=sheet_id|add:"-headers" rows_id=sheet_id|add:"-rows" %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/x-data-spreadsheet@1.1.5/dist/xspreadsheet.css">
<style>
  .ce-sheet-preview-wrap {
    border: 1px solid #ddd;
    border-radius: 10px;
    background: #fff;
    overflow: hidden;
  }
  .ce-sheet-preview-canvas {
    width: 100%;
    min-height: 420px;
  }
  .ce-sheet-preview-note {
    margin: 8px 0 0;
    color: #666;
    font-size: 12px;
  }
  .ce-sheet-fallback {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .ce-sheet-fallback th,
  .ce-sheet-fallback td {
    border: 1px solid #e5e7eb;
    padding: 6px 8px;
    vertical-align: top;
    text-align: left;
    white-space: nowrap;
  }
  .ce-sheet-fallback thead th {
    position: sticky;
    top: 0;
    z-index: 1;
    background: #f9fafb;
  }
</style>

<div class="ce-sheet-preview-wrap">
  <div id="{{ root_id }}" class="ce-sheet-preview-canvas"></div>
</div>
<p class="ce-sheet-preview-note">
  Excel-style preview. You can sort/filter/format for analysis here.
</p>

{{ sheet_headers|json_script:headers_id }}
{{ sheet_rows|json_script:rows_id }}
<script src="https://cdn.jsdelivr.net/npm/x-data-spreadsheet@1.1.5/dist/xspreadsheet.js"></script>
<script>
  (function () {
    const root = document.getElementById('{{ root_id }}');
    if (!root) {
      return;
    }

    const headers = JSON.parse(document.getElementById('{{ headers_id }}').textContent || '[]');
    const rows = JSON.parse(document.getElementById('{{ rows_id }}').textContent || '[]');

    function seedMatrixFromCsv() {
      const width = Math.max(1, Array.isArray(headers) ? headers.length : 0);
      const headerRow = [];
      for (let i = 0; i < width; i += 1) {
        headerRow.push(String(headers[i] == null ? '' : headers[i]));
      }
      const matrix = [headerRow];
      if (!Array.isArray(rows)) {
        return matrix;
      }
      rows
        .filter((r) => Array.isArray(r))
        .forEach((r) => {
          const out = [];
          for (let i = 0; i < width; i += 1) {
            out.push(i < r.length ? String(r[i] == null ? '' : r[i]) : '');
          }
          matrix.push(out);
        });
      return matrix;
    }

    function toSpreadsheetPayload(matrix) {
      const rowCount = Math.max(1, matrix.length);
      const colCount = Math.max(
        1,
        matrix.reduce((max, row) => Math.max(max, Array.isArray(row) ? row.length : 0), 0)
      );
      const rowsObj = { len: rowCount };

      for (let r = 0; r < rowCount; r += 1) {
        const row = Array.isArray(matrix[r]) ? matrix[r] : [];
        const cells = {};
        for (let c = 0; c < colCount; c += 1) {
          const raw = c < row.length ? row[c] : '';
          const text = raw == null ? '' : String(raw);
          if (text) {
            cells[c] = { text };
          }
        }
        if (Object.keys(cells).length) {
          rowsObj[r] = { cells };
        }
      }

      return {
        name: 'Preview',
        freeze: 'A2',
        styles: [],
        merges: {},
        rows: rowsObj,
        cols: { len: colCount },
      };
    }

    function renderFallback(matrix) {
      const table = document.createElement('table');
      table.className = 'ce-sheet-fallback';
      const thead = document.createElement('thead');
      const tbody = document.createElement('tbody');
      table.appendChild(thead);
      table.appendChild(tbody);

      const headerTr = document.createElement('tr');
      (matrix[0] || []).forEach((header) => {
        const th = document.createElement('th');
        th.textContent = String(header == null ? '' : header);
        headerTr.appendChild(th);
      });
      thead.appendChild(headerTr);

      for (let r = 1; r < matrix.length; r += 1) {
        const tr = document.createElement('tr');
        (matrix[r] || []).forEach((cell) => {
          const td = document.createElement('td');
          td.textContent = String(cell == null ? '' : cell);
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      }

      root.innerHTML = '';
      root.style.overflow = 'auto';
      root.appendChild(table);
    }

    const seedMatrix = seedMatrixFromCsv();
    const payload = toSpreadsheetPayload(seedMatrix);

    if (typeof window.x_spreadsheet !== 'function') {
      renderFallback(seedMatrix);
      return;
    }

    try {
      const spreadsheet = x_spreadsheet('#{{ root_id }}', {
        mode: 'edit',
        showToolbar: true,
        showGrid: true,
        showContextmenu: true,
        row: {
          len: Math.max(1, seedMatrix.length),
          height: 28,
        },
        col: {
          len: Math.max(1, seedMatrix[0] ? seedMatrix[0].length : 1),
          width: 140,
          minWidth: 64,
          indexWidth: 50,
        },
        view: {
          height: function () {
            return {{ sheet_height|default:560 }};
          },
        },
      });
      try {
        spreadsheet.loadData(payload);
      } catch (err) {
        spreadsheet.loadData([payload]);
      }
    } catch (err) {
      renderFallback(seedMatrix);
    }
  })();
</script>
{% endwith %}
