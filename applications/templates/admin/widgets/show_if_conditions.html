<div class="ce-logic" data-questions="{{ widget.questions_json|escape }}"
     data-target-label="{{ widget.target_label|default:'question' }}"
     data-conjunction="{{ widget.conjunction|default:'OR' }}">
  <input type="hidden" name="{{ widget.name }}" value="{{ widget.value_json|default:'[]'|escape }}" data-cond-input>
  <label class="ce-logic__toggle">
    <input type="checkbox" data-logic-enabled>
    <span class="ce-logic__switch" aria-hidden="true"></span>
    <span>Show this {{ widget.target_label|default:'question' }} based on an answer</span>
  </label>
  <div class="ce-logic__panel" data-logic-panel hidden>
    <div class="ce-logic__sentence">Show this {{ widget.target_label|default:'question' }} when:</div>
    <div class="ce-logic__rows" data-cond-rows></div>
    <button type="button" class="ce-logic__add" data-add-cond>＋ Add another condition</button>
    <p class="ce-logic__empty" data-no-questions hidden>
      Add a multiple-choice, checkbox, or Yes/No question first.
    </p>
  </div>
</div>
