{% load static inline_static %}
{% with root_id=sheet_id|add:"-root" headers_id=sheet_id|add:"-headers" rows_id=sheet_id|add:"-rows" %}
<link rel="stylesheet" href="{% static 'vendor/x-data-spreadsheet/xspreadsheet.css' %}">
<style>
  /* Keep toolbar text/icons readable across Django admin theme overrides */
  .x-spreadsheet-toolbar,
  .x-spreadsheet-bottombar,
  .x-spreadsheet-toolbar .x-spreadsheet-toolbar-btn,
  .x-spreadsheet-toolbar .x-spreadsheet-dropdown-title,
  .x-spreadsheet-menu > li,
  .x-spreadsheet-menu > li.active,
  .x-spreadsheet-form-input input,
  .x-spreadsheet-form-select,
  .x-spreadsheet-form-select .input-text,
  .x-spreadsheet-item,
  .x-spreadsheet-header {
    color: #1f2937 !important;
  }
  .x-spreadsheet-icon .x-spreadsheet-icon-img {
    opacity: 0.72;
  }

  .ce-sheet-preview-wrap {
    border: 1px solid #ddd;
    border-radius: 10px;
    background: #fff;
    overflow: hidden;
  }
  .ce-sheet-preview-canvas {
    width: 100%;
    min-height: 420px;
  }
  .ce-sheet-preview-note {
    margin: 8px 0 0;
    color: #666;
    font-size: 12px;
  }
  .ce-sheet-fallback {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .ce-sheet-fallback th,
  .ce-sheet-fallback td {
    border: 1px solid #e5e7eb;
    padding: 6px 8px;
    vertical-align: top;
    text-align: left;
    white-space: nowrap;
  }
  .ce-sheet-fallback thead th {
    position: sticky;
    top: 0;
    z-index: 1;
    background: #f9fafb;
  }
  .ce-sheet-deferred {
    padding: 12px;
    border-bottom: 1px solid #e5e7eb;
    background: #f8fafc;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }
  .ce-sheet-deferred-msg {
    color: #334155;
    font-size: 12px;
  }
  .ce-sheet-deferred-btn {
    border: 1px solid #cbd5e1;
    background: #fff;
    color: #0f172a;
    border-radius: 8px;
    height: 34px;
    padding: 0 12px;
    font-weight: 600;
    cursor: pointer;
  }
  .ce-sheet-deferred-btn:hover {
    background: #f8fafc;
  }
</style>

<div class="ce-sheet-preview-wrap">
  <div id="{{ root_id }}" class="ce-sheet-preview-canvas"></div>
</div>
<p class="ce-sheet-preview-note">
  Excel-style preview. You can sort/filter/format for analysis here.
</p>

{{ sheet_headers|json_script:headers_id }}
{{ sheet_rows|json_script:rows_id }}
<script>
{% inline_static 'vendor/x-data-spreadsheet/xspreadsheet.js' %}
</script>
<script>
  (function () {
    const LOCAL_XSHEET_JS_URL = "{% static 'vendor/x-data-spreadsheet/xspreadsheet.js' %}";
    const MAX_AUTO_CELLS = 25000;
    const FORCE_DEFERRED = {{ sheet_deferred|yesno:"true,false,false" }};
    const root = document.getElementById('{{ root_id }}');
    if (!root) {
      return;
    }

    const headers = JSON.parse(document.getElementById('{{ headers_id }}').textContent || '[]');
    const rows = JSON.parse(document.getElementById('{{ rows_id }}').textContent || '[]');

    function seedMatrixFromCsv() {
      const width = Math.max(1, Array.isArray(headers) ? headers.length : 0);
      const headerRow = [];
      for (let i = 0; i < width; i += 1) {
        headerRow.push(String(headers[i] == null ? '' : headers[i]));
      }
      const matrix = [headerRow];
      if (!Array.isArray(rows)) {
        return matrix;
      }
      rows
        .filter((r) => Array.isArray(r))
        .forEach((r) => {
          const out = [];
          for (let i = 0; i < width; i += 1) {
            out.push(i < r.length ? String(r[i] == null ? '' : r[i]) : '');
          }
          matrix.push(out);
        });
      return matrix;
    }

    function hydrateSpreadsheet(spreadsheet, matrix) {
      if (!spreadsheet || typeof spreadsheet.cellText !== 'function') {
        return;
      }
      const tasks = [];
      for (let r = 0; r < matrix.length; r += 1) {
        const row = Array.isArray(matrix[r]) ? matrix[r] : [];
        for (let c = 0; c < row.length; c += 1) {
          const text = String(row[c] == null ? '' : row[c]);
          if (!text) {
            continue;
          }
          tasks.push([r, c, text]);
        }
      }
      let idx = 0;
      const step = function () {
        const end = Math.min(idx + 1200, tasks.length);
        for (; idx < end; idx += 1) {
          const item = tasks[idx];
          spreadsheet.cellText(item[0], item[1], item[2], 0);
        }
        if (idx < tasks.length) {
          window.requestAnimationFrame(step);
        }
      };
      step();
    }

    function ensureSpreadsheetLib() {
      if (typeof window.x_spreadsheet === 'function') {
        return Promise.resolve(true);
      }
      if (window.__ceXSheetLocalLoadPromise && typeof window.__ceXSheetLocalLoadPromise.then === 'function') {
        return window.__ceXSheetLocalLoadPromise;
      }
      window.__ceXSheetLocalLoadPromise = new Promise((resolve) => {
        const tag = document.createElement('script');
        tag.src = LOCAL_XSHEET_JS_URL;
        tag.async = true;
        tag.onload = function () {
          resolve(typeof window.x_spreadsheet === 'function');
        };
        tag.onerror = function () {
          resolve(false);
        };
        document.head.appendChild(tag);
      });
      return window.__ceXSheetLocalLoadPromise;
    }

    function renderFallback(matrix) {
      const warn = document.createElement('div');
      warn.style.padding = '10px 12px';
      warn.style.borderBottom = '1px solid #fde68a';
      warn.style.background = '#fffbeb';
      warn.style.color = '#92400e';
      warn.style.fontSize = '12px';
      warn.textContent = 'Excel-style toolbar library did not load. Showing basic preview fallback.';

      const table = document.createElement('table');
      table.className = 'ce-sheet-fallback';
      const thead = document.createElement('thead');
      const tbody = document.createElement('tbody');
      table.appendChild(thead);
      table.appendChild(tbody);

      const headerTr = document.createElement('tr');
      (matrix[0] || []).forEach((header) => {
        const th = document.createElement('th');
        th.textContent = String(header == null ? '' : header);
        headerTr.appendChild(th);
      });
      thead.appendChild(headerTr);

      for (let r = 1; r < matrix.length; r += 1) {
        const tr = document.createElement('tr');
        (matrix[r] || []).forEach((cell) => {
          const td = document.createElement('td');
          td.textContent = String(cell == null ? '' : cell);
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      }

      root.innerHTML = '';
      root.style.overflow = 'auto';
      root.appendChild(warn);
      root.appendChild(table);
    }

    function initSpreadsheet(matrix) {
      ensureSpreadsheetLib().finally(function () {
        if (typeof window.x_spreadsheet !== 'function') {
          renderFallback(matrix);
          return;
        }
        try {
          const spreadsheet = x_spreadsheet('#{{ root_id }}', {
            mode: 'edit',
            showToolbar: true,
            showGrid: true,
            showContextmenu: true,
            row: {
              len: Math.max(1, matrix.length),
              height: 28,
            },
            col: {
              len: Math.max(1, matrix[0] ? matrix[0].length : 1),
              width: 140,
              minWidth: 64,
              indexWidth: 50,
            },
            view: {
              height: function () {
                return {{ sheet_height|default:560 }};
              },
            },
          });
          hydrateSpreadsheet(spreadsheet, matrix);
        } catch (err) {
          renderFallback(matrix);
        }
      });
    }

    function renderDeferredLoader(matrix, totalCells) {
      const wrap = document.createElement('div');
      wrap.className = 'ce-sheet-deferred';

      const msg = document.createElement('div');
      msg.className = 'ce-sheet-deferred-msg';
      msg.textContent = `Large dataset detected (${totalCells.toLocaleString()} cells). Click to load the full Excel-style sheet.`;

      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'ce-sheet-deferred-btn';
      btn.textContent = 'Load Excel-style sheet';
      btn.addEventListener('click', function () {
        root.innerHTML = '';
        initSpreadsheet(matrix);
      });

      wrap.appendChild(msg);
      wrap.appendChild(btn);
      root.innerHTML = '';
      root.style.overflow = 'auto';
      root.appendChild(wrap);
    }

    const seedMatrix = seedMatrixFromCsv();
    const rowCount = Math.max(0, seedMatrix.length - 1);
    const colCount = Math.max(0, seedMatrix[0] ? seedMatrix[0].length : 0);
    const totalCells = rowCount * colCount;

    if (FORCE_DEFERRED || totalCells > MAX_AUTO_CELLS) {
      renderDeferredLoader(seedMatrix, totalCells);
      return;
    }
    initSpreadsheet(seedMatrix);
  })();
</script>
{% endwith %}
